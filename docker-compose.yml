services:
  web:
    build:
      context: .
      dockerfile: software/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NEXT_PUBLIC_AI_BASE_URL: "http://127.0.0.1:5001"
    restart: unless-stopped

  ai:
    build:
      context: .
      dockerfile: AI/Dockerfile
    ports:
      - "5001:5001"
    environment:
      ENABLE_LOCAL_DISPLAY: "0"
      STREAM_HOST: "0.0.0.0"
      STREAM_PORT: "5001"
      SENSOR_STATUS_API: "http://web:3000/api/sensor-status"
      RGB_CAM: "2"
      THERMAL_CAM: "1"
      ESP32_PORT: "COM9"
      ESP32_BAUD: "115200"
      MODEL_PATH: "/app/AI/models/best.pt"
      STREAM_FPS: "30"
      JPEG_QUALITY: "80"
    depends_on:
      - web
    restart: unless-stopped

# Notes:
# - The web service is straightforward to run in Docker.
# - The ai service exposes:
#   - http://127.0.0.1:5001/rgb_feed
#   - http://127.0.0.1:5001/thermal_feed
#   - http://127.0.0.1:5001/sensor
# - The ai service needs access to your local cameras and serial port.
# - On Windows Docker Desktop, USB camera and COM passthrough to Linux containers is limited.
#   In practice, run `web` in Docker and run `AI/main.py` on the host unless you have a Linux/WSL setup
#   with confirmed device access.
